# Configuraciones base de Gradle
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
android.useAndroidX=true
android.enableJetifier=true

# 🟢 CONFIGURACIÓN CRÍTICA PERMANENTE:
# Desactiva la compilación incremental de Kotlin para evitar bloqueos compartidos en el SDK de Flutter.
kotlin.incremental=false